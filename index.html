<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8FB1CC" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="app-splash">
    <section
      class="d-flex flex-column justify-content-center align-items-center text-center px-3 min-vh-100"
      role="status"
      aria-live="polite"
    >
      <img
        class="animate__animated animate__fadeInDown"
        src="assets/logo_letro.png"
        alt="Bienvenido a letro!"
        width="400"
        height="400"
      />
      <div class="d-flex flex-column justify-content-center align-items-center gap-4">
        <div class="d-flex flex-column gap-2">
          <h1 class="center animate__animated animate__fadeInUp animate__delay-1s">Bienvenido a Letro!</h1>
          <h2 class="center animate__animated animate__fadeInUp animate__delay-2s">¿Listo para aprender?</h2>
        </div>
      <div class="animate__animated animate__fadeInUp animate__delay-2s">
        <div class="spinner-border" role="status" aria-label="Cargando"></div>
      </div>
      </div>
    </section>

    <script src="js/config.js"></script>
    <script src="js/pwa.js"></script>
    <script>
        
      (function () {
        "use strict";

        function safeLoadProfile() {
            var user = localStorage.getItem(window.LETRO_CONFIG.STORAGE_KEY);
            if (!user) return null;
            return JSON.parse(user);
        }

        window.setTimeout(function () {
            if (!safeLoadProfile()) window.location.replace(window.PAGES.REGISTER);
            else window.location.replace(window.PAGES.HOME);
        }, window.LETRO_CONFIG.SPLASH_DELAY_MS);
      })();
    </script> 
  </body>
</html>
