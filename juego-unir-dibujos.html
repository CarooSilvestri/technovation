<!DOCTYPE html>
<!-- app/juego-unir-dibujos.html — Unir palabra con dibujo (maqueta fácil). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letro — Une palabra y dibujo</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="unir-dibujos" id="app-page-juego-unir-dibujos">
    <header class="d-flex align-items-center px-3 py-2 app-home-header">
      <div class="d-flex align-items-center justify-content-between gap-3 w-100">
        <a
          href="home.html"
          class="app-shell-back-link text-body text-decoration-none d-inline-flex align-items-center gap-3 flex-grow-1 min-w-0"
          aria-label="Volver al inicio"
        >
          <span class="d-inline-flex flex-shrink-0 align-items-center justify-content-center fs-5 lh-1" aria-hidden="true"><i class="bi bi-chevron-left"></i></span>
          <span class="app-shell-back-text fw-semibold text-truncate">Volver al inicio</span>
        </a>
        <a
          class="app-home-avatar app-home-avatar-link d-inline-flex align-items-center justify-content-center flex-shrink-0 rounded-circle text-decoration-none"
          href="perfil.html"
          aria-label="Ir al perfil"
        >
          <span id="emoji" aria-hidden="true"></span>
        </a>
      </div>
    </header>

    <main class="container pt-4">
      <h2 class="app-home-title text-center">Une palabra y dibujo</h2>
      <p class="app-home-lead text-center">
        Toca una palabra y el dibujo que le corresponde para unirlos.
      </p>

      <div class="d-flex justify-content-center mb-3">
        <button type="button" class="btn btn-outline-primary btn-sm" id="btnEscucharJuego">
          🔊 Escuchar palabras
        </button>
      </div>

      <div class="match-root w-100 mx-auto">
        <div class="row g-2 mb-3">
          <div class="col-6 text-center">
            <span class="small text-muted">Palabra</span>
          </div>
          <div class="col-6 text-center">
            <span class="small text-muted">Dibujo</span>
          </div>
        </div>
        <div id="listaFilas" class="d-flex flex-column gap-4 w-100"></div>
      </div>

      <div id="estadoJuego" class="small mt-2 text-center" aria-live="polite"></div>

      <div class="d-flex flex-column gap-2 justify-content-center mt-4">
        <button type="button" class="btn btn-primary btn-lg" id="btnComprobar">Comprobar</button>
        <div class="d-flex gap-2 justify-content-between">
          <button type="button" class="btn btn-outline-primary w-50" id="btnVozSiguiente">
            🎤 Decir "siguiente"
          </button>
          <button type="button" class="btn btn-secondary btn-lg w-50" id="btnSiguiente">Siguiente</button>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos/core.js"></script>
    <script src="js/juegos/unir-dibujos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
