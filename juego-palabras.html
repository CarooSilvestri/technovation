<!DOCTYPE html>
<!-- app/juego-palabras.html — Elegir la palabra bien escrita entre opciones (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Palabras bien escritas</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  
  <body data-game="palabras">
    <header class="d-flex align-items-center px-3 py-2 justify-content-between gap-2 app-home-header">
      <div class="d-flex justify-content-between w-100 px-3 py-1 align-items-center">
        <h3 class="app-home-greeting h5 mb-0 fw-semibold text-truncate">
          Volver al inicio
        </h3>
        <a
          class="d-inline-flex align-items-center justify-content-center flex-shrink-0 text-decoration-none"
          href="home.html"
          aria-label="Volver al inicio"
        >
          <span style="font-size: 1.5rem; line-height: 1;" aria-hidden="true">🏠</span>
        </a>
      </div>
    </header>

    <main class="container-fluid py-4">
      <h3 class="text-center">¿Está bien escrita?</h3>
      <p class="app-home-lead text-center">Elige la palabra que está escrita correctamente.</p>

      <div class="card app-card mb-3">
        <div class="card-body">
          <p class="text-muted small mb-1">Pista</p>
          <p class="fs-4 mb-0 text-center" id="pistaTexto">Cargando…</p>
          <button type="button" class="btn btn-outline-primary btn-sm mt-3" id="btnEscucharPalabra">
            🔊 Escuchar palabra
          </button>
        </div>
      </div>

      <div class="d-grid gap-2" id="palabraOpciones"></div>

      <div class="d-grid mt-3">
        <button type="button" class="btn btn-primary btn-lg" id="btnSiguiente">Siguiente</button>
      </div>
      <div class="d-grid mt-2">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/get_name.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
