<!DOCTYPE html>
<!-- Perfil: datos del registro + ajustes. Diseño alineado a maqueta móvil. -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#3E5B77" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>

  <body data-perfil>
    <header class="d-flex align-items-center px-3 py-2 justify-content-between gap-2 app-home-header">
      <div class="d-flex justify-content-between w-100 px-3 py-1 align-items-center">
        <h3 class="app-home-greeting h5 mb-0 fw-semibold text-truncate">
          Volver al inicio
        </h3>
        <a
          class="d-inline-flex align-items-center justify-content-center flex-shrink-0 text-decoration-none"
          href="home.html"
          aria-label="Volver al inicio"
        >
          <span style="font-size: 1.5rem; line-height: 1;" aria-hidden="true">🏠</span>
        </a>
      </div>
    </header>

    <main class="container pt-4 pb-0">
      <div class="text-center ">
        <div class="app-perfil-avatar-wrap">
          <div class="app-perfil-avatar-circle">
            <span class="app-perfil-avatar-emoji" data-perfil-emoji aria-hidden="true">🐝</span>
          </div>
          <button
            type="button"
            class="app-perfil-camera"
            data-perfil-toggle-avatars
            aria-label="Cambiar avatar"
            title="Cambiar avatar"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2v11z"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
              <circle cx="12" cy="13" r="4" stroke="currentColor" stroke-width="2" />
            </svg>
          </button>
        </div>
        <p class="app-perfil-name mb-1" data-perfil-nombre>Nombre</p>
        <p class="app-perfil-role mb-0" data-perfil-subtitulo>—</p>
      </div>

      <div class="app-perfil-card">
        <div class="d-flex align-items-center gap-3 py-2">
          <span class="app-perfil-icon app-perfil-icon-bw" aria-hidden="true"></span>
          <span class="app-perfil-row-label">Modo Blanco y Negro</span>
          <div class="form-check form-switch app-perfil-switch mb-0">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="bw"
              data-profile-bw
            />
            <label class="visually-hidden" for="bw">Modo blanco y negro</label>
          </div>
        </div>
        <div class="d-flex align-items-center gap-3 py-2">
          <span class="app-perfil-icon app-perfil-icon-sound" aria-hidden="true"></span>
          <span class="app-perfil-row-label">Sonido activado</span>
          <div class="form-check form-switch app-perfil-switch mb-0">
            <input
              class="form-check-input"
              type="checkbox"
              role="switch"
              id="sound"
              data-profile-sound
              checked
            />
            <label class="visually-hidden" for="sound">Sonido activado</label>
          </div>
        </div>

        <hr class="my-3 opacity-25" />
        <p class="text-uppercase small fw-bold text-secondary mb-3">Cambiar nivel</p>

        <div class="app-perfil-levels">
          <button type="button" class="app-perfil-level app-perfil-level--facil" data-perfil-level="facil">
            <span class="app-perfil-level-face" aria-hidden="true">😊</span>
            <span class="app-perfil-level-text">
              <span class="app-perfil-level-kicker">NIVEL</span>
              <span class="app-perfil-level-name">FÁCIL</span>
            </span>
            <span class="app-perfil-level-trail" data-perfil-level-indicator></span>
          </button>
          <button
            type="button"
            class="app-perfil-level app-perfil-level--intermedio"
            data-perfil-level="intermedio"
          >
            <span class="app-perfil-level-face" aria-hidden="true">😐</span>
            <span class="app-perfil-level-text">
              <span class="app-perfil-level-kicker">NIVEL</span>
              <span class="app-perfil-level-name">INTERMEDIO</span>
            </span>
            <span class="app-perfil-level-trail" data-perfil-level-indicator></span>
          </button>
          <button type="button" class="app-perfil-level app-perfil-level--dificil" data-perfil-level="dificil">
            <span class="app-perfil-level-face" aria-hidden="true">😆</span>
            <span class="app-perfil-level-text">
              <span class="app-perfil-level-kicker">NIVEL</span>
              <span class="app-perfil-level-name">DIFÍCIL</span>
            </span>
            <span class="app-perfil-level-trail" data-perfil-level-indicator></span>
          </button>
        </div>
      </div>

      <div class="text-center mt-4">
        <button type="button" class="btn btn-link app-perfil-logout" data-perfil-logout>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true" class="me-1">
            <path
              d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          CERRAR SESIÓN
        </button>
      </div>

    </main>

    <div
      class="modal fade"
      id="perfilAvatarModal"
      tabindex="-1"
      aria-labelledby="perfilAvatarModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content rounded-4">
          <div class="modal-header border-0 pb-0">
            <h2 class="modal-title fs-5" id="perfilAvatarModalLabel">Elige tu avatar</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
          </div>
          <div class="modal-body pt-2">
            <div class="row g-3 app-avatar-grid" id="perfil-avatar-grid"></div>
          </div>
          <div class="modal-footer border-0 pt-0">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" class="btn btn-primary" id="btnGuardarAvatarPerfil">Guardar</button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/get_name.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
