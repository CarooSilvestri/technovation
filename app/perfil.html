<!DOCTYPE html>
<!-- app/perfil.html — Ajustes: B/N, sonido, dificultad y foto de perfil. -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Mi perfil</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white app-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Letritas</a>
        <a class="nav-link ms-auto" href="index.html">Inicio</a>
      </div>
    </nav>

    <main class="container py-4 py-md-5" style="max-width: 520px">
      <h1 class="h3 text-center mb-4">Mi perfil</h1>

      <div class="text-center mb-4">
        <div class="d-inline-block rounded-circle bg-light p-4 border" style="font-size: 4rem">
          🐻
        </div>
        <p class="small text-muted mt-2 mb-0">Nombre de ejemplo</p>
      </div>

      <div class="card app-card">
        <div class="list-group list-group-flush">
          <div class="list-group-item d-flex justify-content-between align-items-center py-3">
            <div>
              <span class="fw-semibold d-block">Pantalla en blanco y negro</span>
              <span class="small text-muted">Menos estimulación visual</span>
            </div>
            <div class="form-check form-switch mb-0">
              <input
                class="form-check-input"
                type="checkbox"
                role="switch"
                id="bw"
                data-profile-bw
              />
              <label class="form-check-label visually-hidden" for="bw">Blanco y negro</label>
            </div>
          </div>

          <div class="list-group-item d-flex justify-content-between align-items-center py-3">
            <div>
              <span class="fw-semibold d-block">Sonidos</span>
              <span class="small text-muted">Efectos y voz en los juegos</span>
            </div>
            <div class="form-check form-switch mb-0">
              <input class="form-check-input" type="checkbox" role="switch" id="sound" checked />
              <label class="form-check-label visually-hidden" for="sound">Sonidos</label>
            </div>
          </div>

          <div class="list-group-item py-3">
            <label class="form-label fw-semibold" for="dif">Dificultad</label>
            <select class="form-select form-select-lg" id="dif" name="dificultad">
              <option value="facil" selected>Fácil (solo vocales)</option>
              <option value="intermedio">Intermedio (vocales + consonantes fáciles)</option>
              <option value="dificil">Difícil (todo el abecedario)</option>
            </select>
          </div>

          <div class="list-group-item py-3">
            <span class="fw-semibold d-block mb-2">Cambiar foto de perfil</span>
            <div class="row g-2">
              <div class="col-3">
                <button type="button" class="btn btn-light border w-100 py-2 fs-3">🐻</button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light border w-100 py-2 fs-3">🐰</button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light border w-100 py-2 fs-3">🦊</button>
              </div>
              <div class="col-3">
                <button type="button" class="btn btn-light border w-100 py-2 fs-3">🐸</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-grid gap-2 mt-4">
        <a class="btn btn-primary btn-lg" href="index.html">Ir a los juegos</a>
        <a class="btn btn-outline-secondary" href="registro.html">Volver a registro</a>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
