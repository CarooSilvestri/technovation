<!DOCTYPE html>
<!-- app/juego-unir-mayusculas.html — Unir mayúsculas con minúsculas (maqueta fácil: vocales). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Unir letras</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="unir-mayusculas">
    <header class="d-flex align-items-center app-home-header gap-2">
      <a
        class="app-home-avatar app-home-avatar-link"
        href="perfil.html"
        aria-label="Ir al perfil"
      >
        <span data-home-emoji aria-hidden="true">🐰</span>
      </a>
      <h3 class="app-home-greeting">
        Hola, <span id="name"></span>
      </h3>
      <a href="home.html" class="ms-auto" aria-label="Volver al inicio" style="font-size: 1.5rem;">🏠</a>
    </header>

    <main class="container-fluid py-4" style="max-width: 560px; margin: 0 auto;">
      <h2 class="app-home-title" style="margin-bottom: 0.5rem;">Unir letras</h2>
      <p class="app-home-lead" style="margin-bottom: 1.5rem;">Conecta pares iguales de mayúsculas y minúsculas.</p>
      <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="btnEscucharJuego">
        🔊 Escuchar letras
      </button>

      <div class="match-columns">
        <div class="match-col">
          <span class="small text-muted text-center">Mayúsculas</span>
          <div id="listaMayusculas"></div>
        </div>
        <div class="match-arrows">
          <div id="listaSelectsLetras"></div>
        </div>
        <div class="match-col">
          <span class="small text-muted text-center">Minúsculas</span>
          <div id="listaMinusculas"></div>
        </div>
      </div>

      <div class="d-grid gap-2 mt-4" style="max-width: 280px">
        <button type="button" class="btn btn-primary btn-lg" id="btnComprobar">Comprobar</button>
        <button type="button" class="btn btn-secondary btn-lg" id="btnSiguiente">Siguiente</button>
      </div>
      <div class="d-grid mt-2" style="max-width: 280px">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
      <p class="small text-muted mt-2 mb-0" id="estadoJuego"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
