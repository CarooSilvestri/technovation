<!DOCTYPE html>
<!-- app/juego-letra-sonido.html — Oír sonido y elegir la letra correcta (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Letra y sonido</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="letra-sonido">
    <nav class="navbar bg-white app-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Letritas</a>
        <a class="nav-link" href="index.html">Inicio</a>
      </div>
    </nav>

    <main class="container py-4" style="max-width: 480px">
      <h1 class="h4 mb-1">¿Qué letra es?</h1>
      <p class="text-muted small mb-4">Escuchá el sonido y elegí la letra correcta.</p>

      <div class="card app-card p-4 text-center mb-3">
        <p class="display-1 fw-bold mb-3" aria-hidden="true">🔊</p>
        <button type="button" class="btn btn-primary btn-lg px-5" id="btnEscuchar">▶ Escuchar sonido</button>
        <p class="small text-muted mt-3 mb-0" id="estadoEscucha">Toca para escuchar.</p>
      </div>

      <p class="fw-semibold mb-2">Elegí la letra</p>
      <div class="row g-2" id="letraOpciones"></div>

      <div class="d-grid mt-4">
        <button type="button" class="btn btn-secondary" id="btnSiguiente">Siguiente</button>
      </div>
      <div class="d-grid mt-2">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
      <p class="small mt-2 text-muted" id="estadoJuego"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
  </body>
</html>
