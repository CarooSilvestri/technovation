<!DOCTYPE html>
<!-- app/juego-silabas.html — Completar sílaba tipo M _ con opciones (maqueta con vocales). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Sílabas</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar bg-white app-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Letritas</a>
        <a class="nav-link" href="index.html">Inicio</a>
      </div>
    </nav>

    <main class="container py-4" style="max-width: 480px">
      <h1 class="h4 mb-1">Completar la sílaba</h1>
      <p class="text-muted small mb-4">
        Elegí la letra que falta. Dificultad maquetada: <strong>fácil</strong>.
      </p>

      <div class="card app-card p-4 text-center">
        <p class="display-3 fw-bold mb-1" style="letter-spacing: 0.15em">M _</p>
        <p class="text-muted small mb-0">¿Qué letra va después de M?</p>
      </div>

      <div class="row g-3 mt-2">
        <div class="col-6">
          <button type="button" class="btn btn-outline-primary btn-lg w-100 py-4 fs-2">A</button>
        </div>
        <div class="col-6">
          <button type="button" class="btn btn-outline-primary btn-lg w-100 py-4 fs-2">B</button>
        </div>
        <div class="col-6">
          <button type="button" class="btn btn-outline-primary btn-lg w-100 py-4 fs-2">C</button>
        </div>
        <div class="col-6">
          <button type="button" class="btn btn-outline-primary btn-lg w-100 py-4 fs-2">D</button>
        </div>
      </div>

      <p class="small text-muted mt-3 mb-0">
        Ejemplo tipo consigna: completar “M _” (MA). En fácil podrían usarse solo vocales en las
        opciones; aquí se maquetan A–D como pediste.
      </p>

      <div class="d-grid mt-4">
        <button type="button" class="btn btn-secondary btn-lg" disabled>Siguiente ejercicio (maqueta)</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
