<!DOCTYPE html>
<!-- app/juego-bien-escrita.html — Elegir la palabra bien escrita entre opciones (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letro — Palabras bien escritas</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  
  <body data-game="bien-escrita" id="app-page-juego">
    <header class="d-flex align-items-center px-3 py-2 app-home-header">
      <div class="d-flex align-items-center justify-content-between gap-3 w-100">
        <a
          href="home.html"
          class="app-shell-back-link text-body text-decoration-none d-inline-flex align-items-center gap-3 flex-grow-1 min-w-0"
          aria-label="Volver al inicio"
        >
          <span class="d-inline-flex flex-shrink-0 align-items-center justify-content-center fs-5 lh-1" aria-hidden="true"><i class="bi bi-chevron-left"></i></span>
          <span class="app-shell-back-text fw-semibold text-truncate">Volver al inicio</span>
        </a>
        <a
          class="app-home-avatar app-home-avatar-link d-inline-flex align-items-center justify-content-center flex-shrink-0 rounded-circle text-decoration-none"
          href="perfil.html"
          aria-label="Ir al perfil"
        >
          <span id="emoji" aria-hidden="true"></span>
        </a>
      </div>
    </header>

    <main class="container-fluid py-4">
      <h3 class="text-center">¿Está bien escrita?</h3>
      <p class="app-home-lead text-center">Elige la palabra que está escrita correctamente.</p>

      <div class="card app-card mb-3">
        <div class="card-body d-flex flex-column align-items-center gap-2 text-center">
          <p class="fs-4 mb-0 w-100" id="pistaTexto">Cargando…</p>
          <button type="button" class="btn btn-outline-primary btn-sm" id="btnEscucharPalabra">
            🔊 Escuchar palabra
          </button>
        </div>
      </div>

      <div class="d-grid gap-2" id="palabraOpciones"></div>

      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-outline-primary w-50" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
        <button type="button" class="btn btn-primary btn-lg w-50" id="btnSiguiente">Siguiente</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos/core.js"></script>
    <script src="js/juegos/palabras.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
