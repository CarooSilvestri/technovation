<!DOCTYPE html>
<!-- app/juego-letra-sonido.html — Oír sonido y elegir la letra correcta (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="letra-sonido">
    <header class="d-flex align-items-center px-3 py-2 justify-content-between gap-2 app-home-header">
      <div class="d-flex justify-content-between w-100 px-3 py-1 align-items-center">
        <h3 class="app-home-greeting h5 mb-0 fw-semibold text-truncate">
          Volver al inicio
        </h3>
        <a
          class="d-inline-flex align-items-center justify-content-center flex-shrink-0 text-decoration-none"
          href="home.html"
          aria-label="Volver al inicio"
        >
          <span style="font-size: 1.5rem; line-height: 1;" aria-hidden="true">🏠</span>
        </a>
      </div>
    </header>

    <main class="container-fluid py-4">
      <h3 class="text-center mb-2">¿Qué letra es?</h3>
      <p class="app-home-lead text-center mb-4">Escucha el sonido y elige la letra correcta.</p>

      <div class="card app-card p-4 text-center mb-3">
        <p class="display-1 fw-bold mb-3" aria-hidden="true">🔊</p>
        <button type="button" class="btn btn-primary btn-lg px-5" id="btnEscuchar">▶ Escuchar sonido</button>
        <p class="small text-muted mt-3 mb-0" id="estadoEscucha">Toca para escuchar.</p>
      </div>

      <p class="fw-semibold mb-2">¿Qué letra es?</p>
      <div class="row g-2" id="letraOpciones"></div>

      <div class="d-flex gap-2 justify-content-center mt-4">
        <button type="button" class="btn btn-outline-primary w-50" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
        <button type="button" class="btn btn-secondary btn-lg w-50" id="btnSiguiente">Siguiente</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
