<!DOCTYPE html>
<!-- app/juego-dibujar-letra.html — Trazar letra con guía y botón de sonido (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="dibujar-letra">
    <header class="d-flex align-items-center px-3 py-2 justify-content-between gap-2 app-home-header">
      <div class="d-flex justify-content-between w-100 px-3 py-1 align-items-center">
        <h3 class="app-home-greeting h5 mb-0 fw-semibold text-truncate">
          Volver al inicio
        </h3>
        <a
          class="d-inline-flex align-items-center justify-content-center flex-shrink-0 text-decoration-none"
          href="home.html"
          aria-label="Volver al inicio"
        >
          <span style="font-size: 1.5rem; line-height: 1;" aria-hidden="true">🏠</span>
        </a>
      </div>
    </header>

    <main class="container-fluid py-4" style="max-width: 480px; margin: 0 auto;">
      <h2 class="app-home-title" style="margin-bottom: 0.5rem;">Dibujar la letra</h2>
      <p class="app-home-lead" style="margin-bottom: 1.5rem;">
        Traza la letra en el lienzo y descubre cómo se escribe.
      </p>

      <label class="form-label fw-semibold" for="letraElegida">Elegí una letra</label>
      <select class="form-select form-select-lg mb-3" id="letraElegida">
        <option value="A">A a</option>
        <option value="E">E e</option>
        <option value="I">I i</option>
        <option value="O">O o</option>
        <option value="U">U u</option>
      </select>

      <div class="d-flex align-items-center gap-2 mb-2">
        <span class="fw-semibold">Escuchar</span>
        <button type="button" class="btn btn-outline-primary" id="btnSonidoLetra" title="Reproducir sonido">
          🔊 Sonido de la letra
        </button>
      </div>
      <p class="small text-muted">Escucha la letra y trázala en el recuadro.</p>

      <div class="trace-area mt-3">
        <div class="trace-guide" aria-hidden="true">
          <span style="margin-right: 0.15em">A</span><span style="font-size: 0.65em">a</span>
        </div>
        <canvas class="trace-canvas" id="traceCanvas" width="400" height="220"></canvas>
      </div>

      <div class="mt-3">
        <label class="form-label fw-semibold">Elegí un color</label>
        <div class="d-flex gap-2" id="colorPicker">
          <button type="button" class="btn btn-sm" style="background-color: #4a677d; width: 30px; height: 30px;" data-color="#4a677d"></button>
          <button type="button" class="btn btn-sm" style="background-color: #8fb1cc; width: 30px; height: 30px;" data-color="#8fb1cc"></button>
          <button type="button" class="btn btn-sm" style="background-color: #b4cfb0; width: 30px; height: 30px;" data-color="#b4cfb0"></button>
          <button type="button" class="btn btn-sm" style="background-color: #e5c1cd; width: 30px; height: 30px;" data-color="#e5c1cd"></button>
          <button type="button" class="btn btn-sm" style="background-color: #2d3540; width: 30px; height: 30px;" data-color="#2d3540"></button>
        </div>
      </div>

      <div class="d-flex gap-2 mt-3">
        <button type="button" class="btn btn-outline-secondary" id="btnLimpiar">Borrar trazo</button>
        <button type="button" class="btn btn-primary ms-auto" id="btnSiguiente">Siguiente letra</button>
      </div>
      <div class="d-grid mt-2">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
      <p class="small text-muted mt-2 mb-0" id="estadoJuego"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/get_name.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/juego-dibujar-letra.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
