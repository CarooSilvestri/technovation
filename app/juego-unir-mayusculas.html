<!DOCTYPE html>
<!-- app/juego-unir-mayusculas.html — Unir mayúsculas con minúsculas (maqueta fácil: vocales). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Unir letras</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar bg-white app-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Letritas</a>
        <a class="nav-link" href="index.html">Inicio</a>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="h4 mb-1">Unir mayúsculas y minúsculas</h1>
      <p class="text-muted small mb-4">
        Dificultad maquetada: <strong>fácil</strong> (A, E, I, O, U). Elegí en el medio a qué
        letra corresponde cada fila.
      </p>

      <div class="match-columns">
        <div class="match-col">
          <span class="small text-muted text-center">Mayúsculas</span>
          <div class="match-item">A</div>
          <div class="match-item">E</div>
          <div class="match-item">I</div>
          <div class="match-item">O</div>
          <div class="match-item">U</div>
        </div>
        <div class="match-arrows">
          <select class="form-select" aria-label="Unir fila 1">
            <option>—</option>
            <option>a</option>
            <option>e</option>
            <option>i</option>
            <option>o</option>
            <option>u</option>
          </select>
          <select class="form-select" aria-label="Unir fila 2">
            <option>—</option>
            <option>a</option>
            <option>e</option>
            <option>i</option>
            <option>o</option>
            <option>u</option>
          </select>
          <select class="form-select" aria-label="Unir fila 3">
            <option>—</option>
            <option>a</option>
            <option>e</option>
            <option>i</option>
            <option>o</option>
            <option>u</option>
          </select>
          <select class="form-select" aria-label="Unir fila 4">
            <option>—</option>
            <option>a</option>
            <option>e</option>
            <option>i</option>
            <option>o</option>
            <option>u</option>
          </select>
          <select class="form-select" aria-label="Unir fila 5">
            <option>—</option>
            <option>a</option>
            <option>e</option>
            <option>i</option>
            <option>o</option>
            <option>u</option>
          </select>
        </div>
        <div class="match-col">
          <span class="small text-muted text-center">Minúsculas (orden mezclado en el juego real)</span>
          <div class="match-item">o</div>
          <div class="match-item">u</div>
          <div class="match-item">a</div>
          <div class="match-item">e</div>
          <div class="match-item">i</div>
        </div>
      </div>

      <div class="d-grid gap-2 mt-4" style="max-width: 280px">
        <button type="button" class="btn btn-primary btn-lg" disabled>Comprobar (maqueta)</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
