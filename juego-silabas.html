<!DOCTYPE html>
<!-- app/juego-silabas.html — Completar sílaba tipo M _ con opciones (maqueta con vocales). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Sílabas</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="silabas">
    <header class="d-flex align-items-center app-home-header gap-2">
      <a
        class="app-home-avatar app-home-avatar-link"
        href="perfil.html"
        aria-label="Ir al perfil"
      >
        <span data-home-emoji aria-hidden="true">🐰</span>
      </a>
      <h3 class="app-home-greeting">
        Hola, <span id="name"></span>
      </h3>
      <a href="home.html" class="ms-auto" aria-label="Volver al inicio" style="font-size: 1.5rem;">🏠</a>
    </header>

    <main class="container-fluid py-4" style="max-width: 560px; margin: 0 auto;">
      <h2 class="app-home-title" style="margin-bottom: 0.5rem;">Armar sílabas</h2>
      <p class="app-home-lead" style="margin-bottom: 1.5rem;">Elige la letra que falta para completar la sílaba.</p>

      <div class="card app-card p-4 text-center">
        <p class="display-5 mb-2" id="emojiSilaba">👜</p>
        <p class="display-3 fw-bold mb-1" style="letter-spacing: 0.15em" id="textoSilaba">M _</p>
        <p class="text-muted small mb-0" id="ayudaSilaba">¿Qué letra va después de M?</p>
        <div class="mt-3">
          <button type="button" class="btn btn-outline-primary btn-sm" id="btnEscucharSilaba">
            🔊 Escuchar palabra
          </button>
        </div>
      </div>

      <div class="row g-3 mt-2" id="silabaOpciones"></div>

      <div class="d-grid mt-4">
        <button type="button" class="btn btn-secondary btn-lg" id="btnSiguiente">Siguiente ejercicio</button>
      </div>
      <div class="d-grid mt-2">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
      <p class="small text-muted mt-2 mb-0" id="estadoJuego"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/get_name.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
