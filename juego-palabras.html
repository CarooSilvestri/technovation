<!DOCTYPE html>
<!-- app/juego-palabras.html — Elegir la palabra bien escrita entre opciones (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Palabras bien escritas</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="palabras">
    <header class="d-flex align-items-center app-home-header gap-2">
      <a
        class="app-home-avatar app-home-avatar-link"
        href="perfil.html"
        aria-label="Ir al perfil"
      >
        <span data-home-emoji aria-hidden="true">🐰</span>
      </a>
      <h3 class="app-home-greeting">
        Hola, <span id="name"></span>
      </h3>
      <a href="home.html" class="ms-auto" aria-label="Volver al inicio" style="font-size: 1.5rem;">🏠</a>
    </header>

    <main class="container-fluid py-4" style="max-width: 560px; margin: 0 auto;">
      <h2 class="app-home-title" style="margin-bottom: 0.5rem;">¿Está bien escrita?</h2>
      <p class="app-home-lead" style="margin-bottom: 1.5rem;">Elige la palabra que está escrita correctamente.</p>

      <div class="card app-card mb-3">
        <div class="card-body">
          <p class="text-muted small mb-1">Pista</p>
          <p class="fs-4 mb-0" id="pistaTexto">Cargando…</p>
          <button type="button" class="btn btn-outline-primary btn-sm mt-3" id="btnEscucharPalabra">
            🔊 Escuchar palabra
          </button>
        </div>
      </div>

      <div class="d-grid gap-2" id="palabraOpciones"></div>

      <div class="alert alert-info mt-4 mb-0 small" role="status" id="estadoJuego">
        Elige una opción.
      </div>

      <div class="d-grid mt-3">
        <button type="button" class="btn btn-primary btn-lg" id="btnSiguiente">Siguiente</button>
      </div>
      <div class="d-grid mt-2">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
