<!DOCTYPE html>
<!-- app/juego-palabras.html — Elegir la palabra bien escrita entre opciones (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Palabras bien escritas</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body>
    <nav class="navbar bg-white app-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Letritas</a>
        <a class="nav-link" href="index.html">Inicio</a>
      </div>
    </nav>

    <main class="container py-4" style="max-width: 560px">
      <h1 class="h4 mb-1">Palabra bien escrita</h1>
      <p class="text-muted small mb-4">
        Tocá la opción que esté escrita correctamente. Ejemplo de maqueta (vocal / error común).
      </p>

      <div class="card app-card mb-3">
        <div class="card-body">
          <p class="text-muted small mb-1">Pista</p>
          <p class="fs-4 mb-0">Fruta morada en racimo</p>
        </div>
      </div>

      <div class="d-grid gap-2">
        <button type="button" class="btn btn-light border btn-lg text-start py-3">UVA</button>
        <button type="button" class="btn btn-light border btn-lg text-start py-3">UBA</button>
        <button type="button" class="btn btn-light border btn-lg text-start py-3">UVHA</button>
      </div>

      <div class="alert alert-info mt-4 mb-0 small" role="status">
        Maqueta: la respuesta correcta sería validada en la lógica del juego; aquí solo diseño.
      </div>

      <div class="d-grid mt-3">
        <button type="button" class="btn btn-primary btn-lg" disabled>Siguiente (maqueta)</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
  </body>
</html>
