<!DOCTYPE html>
<!-- app/juego-letra-sonido.html — Oír sonido y elegir la letra correcta (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Letra y sonido</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="letra-sonido">
    <header class="d-flex align-items-center app-home-header gap-2">
      <a
        class="app-home-avatar app-home-avatar-link"
        href="perfil.html"
        aria-label="Ir al perfil"
      >
        <span data-home-emoji aria-hidden="true">🐰</span>
      </a>
      <h3 class="app-home-greeting">
        Hola, <span id="name"></span>
      </h3>
      <a href="home.html" class="ms-auto" aria-label="Volver al inicio" style="font-size: 1.5rem;">🏠</a>
    </header>

    <main class="container-fluid py-4" style="max-width: 480px; margin: 0 auto;">
      <h2 class="app-home-title" style="margin-bottom: 0.5rem;">¿Qué letra es?</h2>
      <p class="app-home-lead" style="margin-bottom: 1.5rem;">Escucha el sonido y elige la letra correcta.</p>

      <div class="card app-card p-4 text-center mb-3">
        <p class="display-1 fw-bold mb-3" aria-hidden="true">🔊</p>
        <button type="button" class="btn btn-primary btn-lg px-5" id="btnEscuchar">▶ Escuchar sonido</button>
        <p class="small text-muted mt-3 mb-0" id="estadoEscucha">Toca para escuchar.</p>
      </div>

      <p class="fw-semibold mb-2">Elegí la letra</p>
      <div class="row g-2" id="letraOpciones"></div>

      <div class="d-grid mt-4">
        <button type="button" class="btn btn-secondary" id="btnSiguiente">Siguiente</button>
      </div>
      <div class="d-grid mt-2">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
      <p class="small mt-2 text-muted" id="estadoJuego"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/get_name.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
