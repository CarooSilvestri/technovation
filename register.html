<!DOCTYPE html>

<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8FB1CC" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="js/config.js"></script>
    <script src="js/nivel-cards.js"></script>
  </head>

  <body id="app-page-registro">
    <header class="app-registro-header pt-4 pb-3 border-bottom border-secondary-subtle rounded-bottom-4">
      <div
        class="container-fluid d-flex flex-column align-items-center gap-2"
      >
        <h2 class="app-registro-title mb-0 text-uppercase">Registro</h2>
        <p class="app-registro-step-meta small mb-0 fw-semibold opacity-75" aria-live="polite">
          Paso <span id="current-step">1</span> de <script>document.write(window.LETRO_CONFIG.STEPS);</script>
        </p>
        <div
          id="registro-progress"
          class="d-flex w-100 gap-2 align-items-center"
          role="progressbar"
          aria-valuemin="1"
          aria-valuemax="3"
          aria-valuenow="1"
          aria-label="Progreso del registro"
        >
          <span class="step-bar active is-current"></span>
          <span class="step-bar"></span>
          <span class="step-bar"></span>
        </div>
      </div>
    </header>

    <main class="container pt-4">
      <form class="app-registro-form d-flex flex-column gap-4" action="#" method="get" onsubmit="return false;">
        <!-- Nombre y avatar -->
        <div id="step-0">
          <h2 class="text-center mb-3">¿Cómo te llamas?</h2>
          <label class="visually-hidden" for="nombre">Nombre</label>
          <input  
            type="text"
            class="form-control form-control-lg app-registro-input"
            id="nombre"
            name="nombre"
            placeholder="Escribe tu nombre aquí"
            autocomplete="name"
          />

          <hr class="my-4"/>
          <div class="d-flex flex-column gap-3">
            <h2 class="text-center pb-3">Elige tu avatar</h2>
            <input type="hidden" id="avatar" name="avatar" value="" />
            <div class="row g-3 app-avatar-grid" id="avatar-grid"></div>
          </div>
        </div>

        <!-- Edad -->
        <div id="step-1" hidden>
          <h2 class="text-center" id="edad-label">¿Cuántos años tienes?</h2>
          <input type="hidden" id="edad" name="edad" value="" />
          <div class="app-edad-picker">
            <div
              class="app-edad-grid row g-3"
              id="edad-grid"
              role="radiogroup"
              aria-labelledby="edad-label"
            ></div>
          </div>
        </div>

        <!-- Nivel (markup desde js/nivel-cards.js) -->
        <div id="step-2" hidden>
          <h2 class="text-center mb-3" id="nivel-title">Elige tu nivel</h2>
          <p class="app-nivel-subtitle">
            Configura el desafío perfecto para comenzar tu viaje de aprendizaje.
          </p>

          <div
            id="registro-nivel-mount"
            class="d-flex flex-column gap-2"
            role="radiogroup"
            aria-labelledby="nivel-title"
          ></div>

          <p class="app-nivel-footnote">
            Podrás cambiar la dificultad en cualquier momento desde ajustes.
          </p>
        </div>

        <!-- Footer -->
        <div class="d-flex footer justify-content-between sticky-bottom gap-2 pb-4">
          <button type="button" class="btn btn-outline-secondary" id="btnBack" hidden>
            Atrás
          </button>
          <button type="button" class="btn btn-primary btn-lg ms-auto" id="btnNext">
            Siguiente →
          </button>
          <button
            type="button"
            class="btn btn-primary btn-lg ms-auto"
            id="btnSubmit"
            hidden
          >
            ¡A jugar!
          </button>
        </div>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/pwa.js"></script>
    <script type="module" src="js/register/register.js"></script>
  </body>
</html>
