<!DOCTYPE html>

<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#8FB1CC" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="js/config.js"></script>
  </head>

  <body data-registro>
    <header class="app-registro-header pt-4 pb-3 border-bottom border-secondary-subtle rounded-bottom-4">
      <div
        class="container-fluid d-flex flex-column align-items-center gap-2"
      >
        <h2 class="app-registro-title mb-0 text-uppercase">Registro</h2>
        <p class="app-registro-step-meta small mb-0 fw-semibold opacity-75" aria-live="polite">
          Paso <span id="">1</span> de <script>document.write(window.LETRO_CONFIG.STEPS);</script>
        </p>
        <div
          class="d-flex w-100 gap-2 align-items-center"
          role="progressbar"
          aria-valuemin="1"
          aria-valuemax="3"
          aria-valuenow="1"
          aria-label="Progreso del registro"
          data-registro-progress
        >
          <span class="step-bar active is-current" data-step-dot></span>
          <span class="step-bar" data-step-dot></span>
          <span class="step-bar" data-step-dot></span>
        </div>
      </div>
    </header>

    <main class="container-fluid pt-4">
      <form class="app-registro-form" action="#" method="get" onsubmit="return false;">
        <!-- Nombre y avatar -->
        <div id="step-0">
          <h2 class="app-registro-question">¿Cómo te llamas?</h2>
          <label class="visually-hidden" for="nombre">Nombre</label>
          <input  
            type="text"
            class="form-control form-control-lg app-registro-input"
            id="nombre"
            name="nombre"
            placeholder="Escribe tu nombre aquí"
            autocomplete="name"
          />

          <hr class="my-4"/>
          <div class="d-flex flex-column gap-3">
            <h2 class="text-center pb-3">Elige tu avatar</h2>
            <div class="row g-3 app-avatar-grid" id="avatar-grid"></div>
          </div>
        </div>

        <!-- Edad -->
        <div id="step-1" hidden>
          <h2 class="app-registro-question app-registro-question--edad">¿Cuántos años tienes?</h2>
          <div class="app-edad-picker" role="group" aria-labelledby="edad-label">
            <span id="edad-label" class="visually-hidden">Elegí tu edad en años</span>
            <input type="hidden" id="edad" name="edad" value="6" />
            <div class="app-edad-grid" data-edad-grid role="radiogroup" aria-labelledby="edad-label"></div>
          </div>
        </div>

        <!-- Nivel -->
        <div id="step-2" hidden class="app-nivel-step">
          <h2 id="nivel-title" class="app-nivel-title">Elige tu nivel</h2>
          <p class="app-nivel-subtitle">
            Configura el desafío perfecto para comenzar tu viaje de aprendizaje.
          </p>

          <div class="app-nivel-cards" role="radiogroup" aria-labelledby="nivel-title">
            <label class="app-nivel-card app-nivel-card--facil">
              <input type="radio" name="dificultad" value="facil" class="visually-hidden" checked />
              <span class="app-nivel-badge">RECOMENDADO</span>
              <div class="app-nivel-card-inner">
                <span class="app-nivel-icon" aria-hidden="true">👶</span>
                <div class="app-nivel-copy">
                  <span class="app-nivel-name">Fácil</span>
                  <span class="app-nivel-desc">Solo vocales para un comienzo suave.</span>
                </div>
              </div>
            </label>

            <label class="app-nivel-card app-nivel-card--intermedio">
              <input type="radio" name="dificultad" value="intermedio" class="visually-hidden" />
              <div class="app-nivel-card-inner">
                <span class="app-nivel-icon" aria-hidden="true">📖</span>
                <div class="app-nivel-copy">
                  <span class="app-nivel-name">Intermedio</span>
                  <span class="app-nivel-desc">Vocales + consonantes para frases.</span>
                </div>
              </div>
            </label>

            <label class="app-nivel-card app-nivel-card--dificil">
              <input type="radio" name="dificultad" value="dificil" class="visually-hidden" />
              <div class="app-nivel-card-inner">
                <span class="app-nivel-icon" aria-hidden="true">🎓</span>
                <div class="app-nivel-copy">
                  <span class="app-nivel-name">Difícil</span>
                  <span class="app-nivel-desc">Abecedario completo. El gran reto.</span>
                </div>
              </div>
            </label>
          </div>

          <p class="app-nivel-footnote">
            Podrás cambiar la dificultad en cualquier momento desde ajustes.
          </p>
        </div>

        <div class="d-flex justify-content-between">
          <button type="button" class="btn btn-outline-secondary" data-registro-prev hidden>
            Atrás
          </button>
          <button type="button" class="btn btn-primary" data-registro-next>
            Siguiente
          </button>
          <button type="button" class="btn btn-primary app-registro-btn-play" data-registro-submit hidden>
            ¡A jugar! <span class="app-registro-btn-play-ico" aria-hidden="true">🚀</span>
          </button>
        </div>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
