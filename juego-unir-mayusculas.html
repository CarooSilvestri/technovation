<!DOCTYPE html>
<!-- app/juego-unir-mayusculas.html — Unir mayúsculas con minúsculas (maqueta fácil: vocales). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letritas — Unir letras</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="unir-mayusculas">
    <nav class="navbar bg-white app-navbar">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Letritas</a>
        <a class="nav-link" href="index.html">Inicio</a>
      </div>
    </nav>

    <main class="container py-4">
      <h1 class="h4 mb-1">Unir mayúsculas y minúsculas</h1>
      <p class="text-muted small mb-4">Selecciona la minúscula para cada mayúscula.</p>
      <button type="button" class="btn btn-outline-primary btn-sm mb-3" id="btnEscucharJuego">
        🔊 Escuchar letras
      </button>

      <div class="match-columns">
        <div class="match-col">
          <span class="small text-muted text-center">Mayúsculas</span>
          <div id="listaMayusculas"></div>
        </div>
        <div class="match-arrows">
          <div id="listaSelectsLetras"></div>
        </div>
        <div class="match-col">
          <span class="small text-muted text-center">Minúsculas</span>
          <div id="listaMinusculas"></div>
        </div>
      </div>

      <div class="d-grid gap-2 mt-4" style="max-width: 280px">
        <button type="button" class="btn btn-primary btn-lg" id="btnComprobar">Comprobar</button>
        <button type="button" class="btn btn-secondary btn-lg" id="btnSiguiente">Siguiente</button>
      </div>
      <div class="d-grid mt-2" style="max-width: 280px">
        <button type="button" class="btn btn-outline-primary" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
      </div>
      <p class="small text-muted mt-2 mb-0" id="estadoJuego"></p>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>
    <script src="js/juegos.js"></script>
  </body>
</html>
