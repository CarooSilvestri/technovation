<!DOCTYPE html>
<!-- app/juego-letra-sonido.html — Oír sonido y elegir la letra correcta (maqueta). -->
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#6c757d" />
    <title>Letro</title>
    <link rel="manifest" href="manifest.json" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link href="css/styles.css" rel="stylesheet" />
  </head>
  <body data-game="letra-sonido" id="app-page-juego">
    <header class="d-flex align-items-center px-3 py-2 app-home-header">
      <div class="d-flex align-items-center justify-content-between gap-3 w-100">
        <a
          href="home.html"
          class="app-shell-back-link text-body text-decoration-none d-inline-flex align-items-center gap-3 flex-grow-1 min-w-0"
          aria-label="Volver al inicio"
        >
          <span class="d-inline-flex flex-shrink-0 align-items-center justify-content-center fs-5 lh-1" aria-hidden="true"><i class="bi bi-chevron-left"></i></span>
          <span class="app-shell-back-text fw-semibold text-truncate">Volver al inicio</span>
        </a>
        <a
          class="app-home-avatar app-home-avatar-link d-inline-flex align-items-center justify-content-center flex-shrink-0 rounded-circle text-decoration-none"
          href="perfil.html"
          aria-label="Ir al perfil"
        >
          <span id="emoji" aria-hidden="true"></span>
        </a>
      </div>
    </header>

    <main class="container-fluid py-4">
      <h3 class="text-center mb-2">¿Qué letra es?</h3>
      <p class="app-home-lead text-center mb-4">Escucha el sonido y elige la letra correcta.</p>

      <div class="card app-card p-3 text-center mb-3">
        <button
          type="button"
          class="btn btn-primary btn-lg rounded-pill px-4 py-2 d-inline-flex align-items-center justify-content-center gap-2"
          id="btnEscuchar"
        >
          <span aria-hidden="true">🔊</span>
          <span>Escuchar sonido</span>
        </button>
        <p class="small text-muted mt-2 mb-0" id="estadoEscucha">Toca para reproducir.</p>
      </div>

      <p class="fw-semibold mb-2 text-center">¿Qué letra es?</p>
      <div class="row g-2 justify-content-center" id="letraOpciones"></div>
      <p id="estadoJuego" class="small text-center mt-2 mb-0"></p>

      <div class="d-flex gap-2 justify-content-center mt-4">
        <button type="button" class="btn btn-outline-primary w-50" id="btnVozSiguiente">🎤 Decir "siguiente"</button>
        <button type="button" class="btn btn-secondary btn-lg w-50" id="btnSiguiente">Siguiente</button>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="js/config.js"></script>
    <script src="js/pwa.js"></script>
    <script src="js/app.js"></script>
    <script src="js/juegos/core.js"></script>
    <script src="js/juegos/letra-sonido.js"></script>
    <script src="js/emoji-extended.js"></script>
  </body>
</html>
